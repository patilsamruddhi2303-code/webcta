<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">CMS Portal</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="student_dashboard.html">Dashboard</a></li>
            <li><a href="view_notices.html">Notices</a></li>
            <li><a href="about.html">About</a></li>
        </ul>

    </nav>


    <!-- HEADER -->

    <section class="dashboard-header">

        <h1>Contact Us</h1>

        <p>
            Get in touch with the department
        </p>

    </section>


    <!-- CONTACT FORM -->

    <section class="contact-section">

        <form class="contact-form">

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Phone Number</label>
            <input type="number" placeholder="Enter your phone number">

            <label>Department</label>
            <select required>
                <option>Select Department</option>
                <option>Computer Science</option>
                <option>Information Science</option>
                <option>Electronics</option>
            </select>

            <label>Gender</label>
            <div>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
            </div>

            <label>Message</label>
            <textarea rows="5" placeholder="Enter your message"></textarea>

            <label>
                <input type="checkbox"> I agree to terms and conditions
            </label>

            <button type="submit" class="btn">Send Message</button>

        </form>

    </section>


    <!-- CONTACT INFO -->

    <section class="contact-info">

        <h2>Department Contact</h2>

        <p>Email: csdept@college.edu</p>
        <p>Phone: +91 9876543210</p>
        <p>Address: Computer Science Department, Your College</p>

    </section>


    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 Circular Management System | Contact Page
        </p>

    </footer>

</body>
</html>
