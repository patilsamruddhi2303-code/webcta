<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CMS Portal</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            CMS Portal
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Signup</a></li>
        </ul>

    </nav>


    <!-- LOGIN SECTION -->

    <section class="form-page">

        <div class="form-container">

            <h1>Login</h1>

            <p class="form-subtitle">
                Login using your USN or Employee ID
            </p>

            <!-- FORM -->

            <form action="#" method="POST">

                <!-- USN -->

                <label>USN / Employee ID</label>

                <input
                    type="text"
                    name="usn"
                    placeholder="Enter your USN or Employee ID"
                    required
                >


                <!-- PASSWORD -->

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >


                <!-- ROLE -->

                <label>Select Role</label>

                <select name="role" required>

                    <option value="">Choose Role</option>

                    <option value="student">
                        Student
                    </option>

                    <option value="faculty">
                        Faculty
                    </option>

                    <option value="admin">
                        Admin
                    </option>

                    <option value="hod">
                        HOD
                    </option>

                </select>


                <!-- REMEMBER -->

                <div class="checkbox-group">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                </div>


                <!-- BUTTON -->

                <button type="submit" class="btn">
                    Login
                </button>

            </form>


            <!-- SIGNUP LINK -->

            <p class="bottom-text">

                Don't have an account?

                <a href="signup.html">
                    Create Account
                </a>

            </p>

        </div>

    </section>

</body>
</html>
