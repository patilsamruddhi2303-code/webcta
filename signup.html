<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - CMS Portal</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            CMS Portal
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>

    </nav>


    <!-- SIGNUP SECTION -->

    <section class="form-page">

        <div class="form-container signup-form">

            <h1>Create Account</h1>

            <p class="form-subtitle">
                Register to access department circulars and notices
            </p>


            <!-- FORM -->

            <form action="#" method="POST">


                <!-- FULL NAME -->

                <label>Full Name</label>

                <input
                    type="text"
                    name="fullname"
                    placeholder="Enter your full name"
                    required
                >


                <!-- USN -->

                <label>USN</label>

                <input
                    type="text"
                    name="usn"
                    placeholder="Enter your USN"
                    required
                >


                <!-- EMAIL -->

                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >


                <!-- DATE -->

                <label>Date of Birth</label>

                <input
                    type="date"
                    name="dob"
                    required
                >


                <!-- PHONE -->

                <label>Phone Number</label>

                <input
                    type="number"
                    name="phone"
                    placeholder="Enter phone number"
                    required
                >


                <!-- GENDER -->

                <label>Gender</label>

                <div class="radio-group">

                    <label>
                        <input
                            type="radio"
                            name="gender"
                            value="male"
                        >
                        Male
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="gender"
                            value="female"
                        >
                        Female
                    </label>

                </div>


                <!-- DEPARTMENT -->

                <label>Department</label>

                <select name="department">

                    <option>
                        Computer Science
                    </option>

                    <option>
                        Information Science
                    </option>

                    <option>
                        Electronics
                    </option>

                    <option>
                        Mechanical
                    </option>

                </select>


                <!-- INTERESTS -->

                <label>Interested Areas</label>

                <div class="checkbox-group">

                    <label>
                        <input type="checkbox">
                        Workshops
                    </label>

                    <label>
                        <input type="checkbox">
                        Hackathons
                    </label>

                    <label>
                        <input type="checkbox">
                        Placements
                    </label>

                    <label>
                        <input type="checkbox">
                        Technical Events
                    </label>

                </div>


                <!-- PASSWORD -->

                <label>Create Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Create password"
                    required
                >


                <!-- CONFIRM PASSWORD -->

                <label>Confirm Password</label>

                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required
                >


                <!-- FILE UPLOAD -->

                <label>Upload ID Card</label>

                <input
                    type="file"
                    name="idcard"
                >


                <!-- BUTTON -->

                <button type="submit" class="btn">
                    Create Account
                </button>

            </form>


            <!-- LOGIN LINK -->

            <p class="bottom-text">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </div>

    </section>

</body>
</html>
